<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Station</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
    <link rel="stylesheet" href="/static/app.css">
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
    <!-- Nav -->
    <nav class="bg-gray-800 border-b border-gray-700">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <h1 class="text-xl font-bold text-white">Weather Station</h1>
            <div class="flex gap-4 text-sm">
                <a href="/" class="text-blue-400 font-medium">Dashboard</a>
                <a href="/history" class="text-gray-400 hover:text-white">History</a>
                <a href="/highlights" class="text-gray-400 hover:text-white">Highlights</a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-6">
        <!-- Live camera + conditions -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">
            <!-- Camera image -->
            <div class="lg:col-span-2">
                <div class="bg-gray-800 rounded-lg overflow-hidden shadow-lg relative cursor-pointer group"
                     onclick="openImageFullscreen()">
                    <img id="live-image" src="/images/current.jpg" alt="Live camera"
                         class="w-full h-auto" loading="eager">
                    <div class="px-4 py-2 text-xs text-gray-500" id="image-time"></div>
                    <!-- Expand icon -->
                    <div class="absolute bottom-8 right-3 bg-black/50 rounded p-1 opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#d1d5db" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
                            <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
                        </svg>
                    </div>
                </div>
            </div>

            <!-- Current conditions -->
            <div class="space-y-3" id="conditions">
                <!-- Temperature section -->
                <div class="bg-gray-800 rounded-lg p-5 shadow-lg">
                    <div class="flex justify-between items-baseline mb-1">
                        <span class="text-xs text-gray-500 uppercase tracking-wide">Temperature</span>
                        <span class="text-xs text-gray-500" id="obs-time"></span>
                    </div>
                    <div class="text-6xl font-bold text-teal-400" id="temp">--</div>
                    <div class="flex flex-wrap gap-x-4 gap-y-1 mt-3 text-sm text-gray-400">
                        <div>Feels <span class="text-gray-200 font-medium" id="feels-like">--</span></div>
                        <div>Dew <span class="text-gray-200 font-medium" id="dew-point">--</span></div>
                        <div>Humidity <span class="text-gray-200 font-medium" id="humidity">--</span></div>
                    </div>
                </div>

                <!-- Wind section -->
                <div class="bg-gray-800 rounded-lg p-5 shadow-lg">
                    <div class="text-xs text-gray-500 uppercase tracking-wide mb-3">Wind</div>
                    <div class="flex items-center gap-4">
                        <!-- SVG Compass -->
                        <div class="flex-shrink-0">
                            <svg id="wind-compass" width="120" height="120" viewBox="0 0 120 120">
                                <circle cx="60" cy="60" r="54" fill="none" stroke="#4b5563" stroke-width="1"/>
                                <!-- Minor ticks every 10 degrees -->
                                <g stroke="#6b7280" stroke-width="1">
                                    <line x1="60" y1="8" x2="60" y2="14" transform="rotate(0 60 60)"/>
                                    <line x1="60" y1="8" x2="60" y2="12" transform="rotate(10 60 60)"/>
                                    <line x1="60" y1="8" x2="60" y2="12" transform="rotate(20 60 60)"/>
                                    <line x1="60" y1="8" x2="60" y2="12" transform="rotate(30 60 60)"/>
                                    <line x1="60" y1="8" x2="60" y2="12" transform="rotate(40 60 60)"/>
                                    <line x1="60" y1="8" x2="60" y2="12" transform="rotate(50 60 60)"/>
                                    <line x1="60" y1="8" x2="60" y2="12" transform="rotate(60 60 60)"/>
                                    <line x1="60" y1="8" x2="60" y2="12" transform="rotate(70 60 60)"/>
                                    <line x1="60" y1="8" x2="60" y2="12" transform="rotate(80 60 60)"/>
                                    <line x1="60" y1="8" x2="60" y2="14" transform="rotate(90 60 60)"/>
                                    <line x1="60" y1="8" x2="60" y2="12" transform="rotate(100 60 60)"/>
                                    <line x1="60" y1="8" x2="60" y2="12" transform="rotate(110 60 60)"/>
                                    <line x1="60" y1="8" x2="60" y2="12" transform="rotate(120 60 60)"/>
                                    <line x1="60" y1="8" x2="60" y2="12" transform="rotate(130 60 60)"/>
                                    <line x1="60" y1="8" x2="60" y2="12" transform="rotate(140 60 60)"/>
                                    <line x1="60" y1="8" x2="60" y2="12" transform="rotate(150 60 60)"/>
                                    <line x1="60" y1="8" x2="60" y2="12" transform="rotate(160 60 60)"/>
                                    <line x1="60" y1="8" x2="60" y2="12" transform="rotate(170 60 60)"/>
                                    <line x1="60" y1="8" x2="60" y2="14" transform="rotate(180 60 60)"/>
                                    <line x1="60" y1="8" x2="60" y2="12" transform="rotate(190 60 60)"/>
                                    <line x1="60" y1="8" x2="60" y2="12" transform="rotate(200 60 60)"/>
                                    <line x1="60" y1="8" x2="60" y2="12" transform="rotate(210 60 60)"/>
                                    <line x1="60" y1="8" x2="60" y2="12" transform="rotate(220 60 60)"/>
                                    <line x1="60" y1="8" x2="60" y2="12" transform="rotate(230 60 60)"/>
                                    <line x1="60" y1="8" x2="60" y2="12" transform="rotate(240 60 60)"/>
                                    <line x1="60" y1="8" x2="60" y2="12" transform="rotate(250 60 60)"/>
                                    <line x1="60" y1="8" x2="60" y2="12" transform="rotate(260 60 60)"/>
                                    <line x1="60" y1="8" x2="60" y2="14" transform="rotate(270 60 60)"/>
                                    <line x1="60" y1="8" x2="60" y2="12" transform="rotate(280 60 60)"/>
                                    <line x1="60" y1="8" x2="60" y2="12" transform="rotate(290 60 60)"/>
                                    <line x1="60" y1="8" x2="60" y2="12" transform="rotate(300 60 60)"/>
                                    <line x1="60" y1="8" x2="60" y2="12" transform="rotate(310 60 60)"/>
                                    <line x1="60" y1="8" x2="60" y2="12" transform="rotate(320 60 60)"/>
                                    <line x1="60" y1="8" x2="60" y2="12" transform="rotate(330 60 60)"/>
                                    <line x1="60" y1="8" x2="60" y2="12" transform="rotate(340 60 60)"/>
                                    <line x1="60" y1="8" x2="60" y2="12" transform="rotate(350 60 60)"/>
                                </g>
                                <!-- Cardinal labels -->
                                <text x="60" y="24" text-anchor="middle" fill="#9ca3af" font-size="10" font-weight="bold">N</text>
                                <text x="100" y="64" text-anchor="middle" fill="#9ca3af" font-size="10">E</text>
                                <text x="60" y="102" text-anchor="middle" fill="#9ca3af" font-size="10">S</text>
                                <text x="20" y="64" text-anchor="middle" fill="#9ca3af" font-size="10">W</text>
                                <!-- Direction arrow (points up = North by default, rotated by JS) -->
                                <g id="wind-arrow" transform="rotate(0 60 60)">
                                    <polygon points="60,22 54,44 66,44" fill="#d1d5db"/>
                                    <line x1="60" y1="44" x2="60" y2="78" stroke="#d1d5db" stroke-width="2"/>
                                </g>
                                <!-- Center label -->
                                <text id="wind-dir-label" x="60" y="64" text-anchor="middle" fill="#e5e7eb" font-size="14" font-weight="bold">--</text>
                            </svg>
                        </div>
                        <!-- Wind values -->
                        <div class="flex-1">
                            <div class="text-3xl font-bold" id="wind">--</div>
                            <div class="text-sm text-gray-400 mt-1">Gust <span class="text-gray-200 font-medium" id="wind-gust">--</span></div>
                        </div>
                    </div>
                </div>

                <!-- Conditions section -->
                <div class="bg-gray-800 rounded-lg p-5 shadow-lg">
                    <div class="text-xs text-gray-500 uppercase tracking-wide mb-3">Conditions</div>
                    <div class="space-y-2">
                        <div class="flex justify-between items-center">
                            <span class="text-sm text-gray-400">Pressure</span>
                            <span class="text-lg font-semibold" id="pressure">--</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-sm text-gray-400">Rain Rate</span>
                            <span class="text-lg font-semibold" id="precip-rate">--</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-sm text-gray-400">UV Index</span>
                            <span class="text-lg font-semibold" id="uv">--</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Today's chart -->
        <div class="bg-gray-800 rounded-lg p-4 shadow-lg">
            <h2 class="text-lg font-semibold mb-3">Today</h2>
            <div style="height: 250px;">
                <canvas id="today-chart"></canvas>
            </div>
        </div>

        <!-- Fullscreen image overlay -->
        <div id="fullscreen-overlay" class="fixed inset-0 bg-black z-50 hidden flex-col items-center justify-center">
            <button onclick="closeImageFullscreen()" class="absolute top-4 right-4 z-10 text-white/70 hover:text-white p-2" aria-label="Close">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
            <img id="fullscreen-image" src="" alt="Live camera fullscreen"
                 class="max-w-full max-h-full object-contain">
            <div class="absolute bottom-4 text-xs text-gray-500" id="fullscreen-time"></div>
        </div>
    </main>

    <script src="/static/app.js"></script>
</body>
</html>
