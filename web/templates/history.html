<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History - Weather Station</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
    <link rel="stylesheet" href="/static/app.css">
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
    <nav class="bg-gray-800 border-b border-gray-700">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <h1 class="text-xl font-bold text-white">Weather Station</h1>
            <div class="flex gap-4 text-sm">
                <a href="/" class="text-gray-400 hover:text-white">Dashboard</a>
                <a href="/history" class="text-blue-400 font-medium">History</a>
                <a href="/highlights" class="text-gray-400 hover:text-white">Highlights</a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-6">
        <!-- Range picker -->
        <div class="flex flex-wrap gap-2 mb-6 items-center">
            <button onclick="loadRange(1, this)" class="range-btn px-3 py-1 rounded bg-gray-700 hover:bg-gray-600 text-sm" data-range="1">24h</button>
            <button onclick="loadRange(7, this)" class="range-btn px-3 py-1 rounded bg-gray-700 hover:bg-gray-600 text-sm" data-range="7">7 days</button>
            <button onclick="loadRange(30, this)" class="range-btn px-3 py-1 rounded bg-gray-700 hover:bg-gray-600 text-sm" data-range="30">30 days</button>
            <span class="text-gray-600 mx-1">|</span>
            <input type="date" id="date-from" class="bg-gray-700 rounded px-2 py-1 text-sm">
            <input type="date" id="date-to" class="bg-gray-700 rounded px-2 py-1 text-sm">
            <button onclick="loadCustomRange()" class="px-3 py-1 rounded bg-gray-700 hover:bg-gray-600 text-sm">Go</button>
            <span class="text-gray-600 mx-1">|</span>
            <button onclick="lockRange()" id="lock-btn" class="px-3 py-1 rounded bg-gray-700 hover:bg-gray-600 text-sm hidden" title="Snapshot current view as a shareable link">Lock</button>
        </div>

        <!-- Charts -->
        <div class="space-y-4">
            <div class="bg-gray-800 rounded-lg p-4 shadow-lg">
                <h3 class="text-sm font-medium text-gray-400 mb-2">Temperature & Dew Point</h3>
                <div style="height: 200px;"><canvas id="temp-chart"></canvas></div>
            </div>
            <div class="bg-gray-800 rounded-lg p-4 shadow-lg">
                <h3 class="text-sm font-medium text-gray-400 mb-2">Wind Speed & Gusts</h3>
                <div style="height: 200px;"><canvas id="wind-chart"></canvas></div>
            </div>
            <div class="bg-gray-800 rounded-lg p-4 shadow-lg">
                <h3 class="text-sm font-medium text-gray-400 mb-2">Precipitation</h3>
                <div style="height: 150px;"><canvas id="precip-chart"></canvas></div>
            </div>
            <div class="bg-gray-800 rounded-lg p-4 shadow-lg">
                <h3 class="text-sm font-medium text-gray-400 mb-2">Barometric Pressure</h3>
                <div style="height: 150px;"><canvas id="pressure-chart"></canvas></div>
            </div>
        </div>

        <!-- Image popup (shown when clicking a chart point) -->
        <div id="image-popup" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-50" onclick="closePopup()">
            <div class="max-w-3xl w-full mx-4" onclick="event.stopPropagation()">
                <img id="popup-image" src="" class="w-full rounded-lg shadow-2xl">
                <div class="text-center text-sm text-gray-400 mt-2" id="popup-info"></div>
            </div>
        </div>
    </main>

    <script src="/static/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => initHistoryFromURL());
    </script>
</body>
</html>
