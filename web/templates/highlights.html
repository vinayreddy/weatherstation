<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Highlights - Weather Station</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/app.css">
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
    <nav class="bg-gray-800 border-b border-gray-700">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <h1 class="text-xl font-bold text-white">Weather Station</h1>
            <div class="flex gap-4 text-sm">
                <a href="/" class="text-gray-400 hover:text-white">Dashboard</a>
                <a href="/history" class="text-gray-400 hover:text-white">History</a>
                <a href="/highlights" class="text-blue-400 font-medium">Highlights</a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-6">
        <h2 class="text-2xl font-bold mb-6">Highlights</h2>
        <p class="text-gray-400 mb-8">
            Interesting weather moments will appear here once the image archiver is running (Phase 3).
            For now, browse images via the <a href="/history" class="text-blue-400 hover:underline">History</a> page.
        </p>

        <div id="highlights-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
            <!-- Populated by JS in Phase 3 -->
        </div>
    </main>
</body>
</html>
